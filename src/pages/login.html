<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopWise</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body>
<div class="container">

    <section class="areaverde">
        <div class="areaverde-conteudo">
            <img src="../assets/img/logoshopwise.png" alt="logo shopwise" style="margin-bottom: 20px;">
            <h1>Entre e aproveite benefícios exclusivos</h1>
            <p>
                Aplique cupons, ganhe cashback, acompanhe a variação
                de preço de um produto e receba alerta quando atingir
                o valor desejado.
            </p>
        </div>
    </section>

    <section class="form">

        <div class="card-login">

            <h2>Bem-vindo de volta</h2>
            <p class="subtitulo">Faça login para continuar</p>
            <button class="btn-branco">
                <img src="../assets/icones/google.png" alt="icon google">
                Continuar com Google
            </button>
            
            <button class="btn-azul">
                <img src="../assets/icones/facebook.png" alt="icon facebook">
                Continuar com Facebook
            </button>

            <div class="divider">
                <span>ou</span>
            </div>

            <form action="/login" method="POST">
                <div class="input-group">
                    <input type="email"name="email" placeholder="Digite seu email" required>
                </div>

                <div class="input-group">
                    <input type="password" name="senha" placeholder="Digite sua senha" required>
                </div>

                <div class="esqueci-senha">
                    <a href="Senha.html ">Esqueceu sua senha?</a>
                </div>
                <a href="feedproduto.html"><button type="submit" class="btn-verde">Entrar</button></a>
            </form>
        
            <div class="bottom-links">
                <a href="cadastrousuario.html">Criar cadastro</a>
                <a href="cadastromercado.html">Cadastrar Supermercado</a>
            </div>
        </div>
    </section>
</div>
</body>
</html>
