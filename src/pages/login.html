<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopWise</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body>

<div class="container">

    <section class="left">
        <div class="left-content">
            <img src="../assets/logoshopwise.png" alt="logo shopwise" style="margin-bottom: 20px;">
            <h1>Entre e aproveite benefícios exclusivos</h1>
            <p>
                Aplique cupons, ganhe cashback, acompanhe a variação
                de preço de um produto e receba alerta quando atingir
                o valor desejado.
            </p>
        </div>
    </section>

    <section class="right">

        <div class="card-login">

            <h2>Bem-vindo de volta</h2>
            <p class="subtitle">Faça login para continuar</p>
            <button class="social-btn">
                Continuar com Google
            </button>
            
            <button class="social--btn-facebook">
                Continuar com Facebook
            </button>

            <div class="divider">
                <span>ou</span>
            </div>

            <div class="input-group">
                <input type="email" placeholder="Digite seu email">
            </div>

            <div class="input-group senha">
                <input type="password" placeholder="Digite sua senha">
            </div>

            <div class="forgot-password">
                <a href="#">Esqueceu sua senha?</a>
            </div>

            <button class="btn-entrar">Entrar</button>
            <div class="bottom-links">
                <a href="#">Criar cadastro</a>
                <a href="#">Cadastrar Supermercado</a>
            </div>
        </div>
    </section>
</div>
</body>
</html>
