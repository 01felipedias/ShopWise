<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopWise - Carrinho</title>

    <link rel="stylesheet" href="../styles/feed.css">
</head>

<body>
    <div class="app-layout">
        
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-toggle-btn" id="desktopMenuToggle" role="button" tabindex="0" aria-label="Alternar menu lateral">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </div>
                <a href="#" aria-label="Ir para a página inicial">
                    <img src="../assets/img/logoshopwise.png" alt="ShopWise" class="sidebar-full-logo" onerror="this.onerror=null; this.src='https://placehold.co/120x35/2ECC71/ffffff?text=ShopWise';">
                </a>
            </div>

            <nav class="sidebar-nav">
                <a href="feedproduto.html" class="nav-item active" aria-label="Página Inicial">
                    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <span>Início</span>
                </a>
                
                <a href="#" class="nav-item" aria-label="Seus Alertas">
                    <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    <span>Alertas</span>
                </a>

                <a href="#" class="nav-item" aria-label="Seu Perfil">
                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span>Perfil</span>
                </a>

                <a href="#" class="nav-item" aria-label="Seu Cashback">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    <span>Cashback</span>
                </a>

                <a href="#" class="nav-item" aria-label="Seus Pedidos">
                    <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                    <span>Pedidos</span>
                </a>
            </nav>
        </aside>
    <div class="main-content">

        <!-- Navbar -->
        <header class="navbar">

            <div class="nav-container">

                <div class="cart-navbar">

                    <div></div>

                    <h2 class="cart-title">
                        Meu Carrinho
                    </h2>

                   <a href="feedproduto.html"class="cart-close-btn"aria-label="Fechar carrinho">
                    <svg width="24"height="24"viewBox="0 0 24 24"fill="none"stroke="currentColor"stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </a>

                </div>
            </div>
        </header>

        <main class="page-container">

            <h1 class="page-title">
                Carrinho de Compras
            </h1>

            <div class="cart-layout">

                <section class="cart-products" id="cartProducts">
                </section>

                <aside class="cart-summary">

                    <h2>Resumo do Pedido</h2>

                    <div class="summary-row">
                        <span>Subtotal</span>
                        <strong id="subtotal">R$ 0,00</strong>
                    </div>

                    <div class="summary-row">
                        <span>Entrega</span>
                        <strong>Grátis</strong>
                    </div>

                    <hr style="margin:20px 0">

                    <div class="summary-total">
                        <span>Total</span>
                        <strong id="total">R$ 0,00</strong>
                    </div>

                    <button class="btn-verde" onclick="window.location.href='checkout.html'">
                        Realizar Pedido
                    </button>


                </aside>

            </div>

        </main>

    </div>

</div>
<script src="../utils/carrinho.js"></script>
</body>
</html>
