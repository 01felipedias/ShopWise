
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopWise - Recuperar Senha</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>

    <div class="container">
        
        <section class="left">
            <div class="left-content">
                <img src="../assets/logoshopwise.png" alt="Logo ShopWise" class="logo-img">
                
                <h1>Recupere o seu<br>acesso</h1>
                <p>
                    Não perca seus benefícios exclusivos.<br>
                    Redefina sua senha e continue acompanhando<br>
                    as melhores ofertas e cupons.
                </p>
            </div>
        </section>

        <main class="right">
            <div class="card-login">
                <h2>Esqueceu a senha?</h2>
                <p class="subtitle">Digite o seu email de cadastro abaixo. Enviaremos um link seguro para você redefinir sua senha.</p>

                <form action="#">
                    <div class="input-group">
                        <input type="email" placeholder="Digite seu email de cadastro" required>
                    </div>

                    <button type="submit" class="btn-verde">Enviar link de recuperação</button>
                </form>

                <div class="bottom-links" style="margin-top: 35px;">
                    <a href="login.html">&#8592; Voltar para o login</a>
                </div>
            </div>
        </main>

    </div>

</body>
</html>
